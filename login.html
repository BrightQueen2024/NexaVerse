<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaVerse | Digital Nation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --void: #03000d;
      --deep: #07011a;
      --surface: rgba(255, 255, 255, 0.035);
      --border: rgba(180, 120, 255, 0.15);
      --border-glow: rgba(180, 120, 255, 0.45);
      --purple-core: #8b3dff;
      --fuchsia-core: #d63aff;
      --cyan-accent: #00e5ff;
      --text-primary: #f0ecff;
      --text-muted: rgba(180, 160, 220, 0.5);
      --text-dim: rgba(140, 120, 180, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--void);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 40px 20px;
    }

    /* ── SCENE LAYERS ── */

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Noise grain overlay */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    /* Deep nebula blobs */
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }

    .nebula-1 {
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(120, 40, 255, 0.18) 0%, transparent 70%);
      top: -350px;
      left: -300px;
      animation: drift1 28s ease-in-out infinite;
    }

    .nebula-2 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(200, 30, 255, 0.14) 0%, transparent 70%);
      bottom: -250px;
      right: -200px;
      animation: drift2 34s ease-in-out infinite;
    }

    .nebula-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.07) 0%, transparent 70%);
      top: 40%;
      left: 55%;
      animation: drift3 20s ease-in-out infinite;
    }

    @keyframes drift1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(60px, 40px) scale(1.08);
      }
    }

    @keyframes drift2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-50px, -30px) scale(1.05);
      }
    }

    @keyframes drift3 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-30px, 20px);
      }
    }

    /* Star field */
    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 15%, rgba(255, 255, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 23% 67%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 31%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 82%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 12%, rgba(255, 255, 255, 0.65) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 54%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 84% 78%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 35%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 88%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 46% 47%, rgba(180, 130, 255, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 17% 43%, rgba(255, 255, 255, 0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 25%, rgba(255, 255, 255, 0.45) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 90%, rgba(200, 150, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 61%, rgba(255, 255, 255, 0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 72% 8%, rgba(150, 210, 255, 0.5) 0%, transparent 100%);
    }

    /* Rotating world globe */
    .globe-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: transparent;
    }

    .globe-ring {
      position: relative;
      width: 620px;
      height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .globe-img {
      width: 620px;
      height: 620px;
      object-fit: contain;
      opacity: 0.18;
      animation: spinSlow 35s linear infinite;
      filter: saturate(1.0) brightness(0.5) contrast(0.9) drop-shadow(0 0 30px rgba(80, 140, 255, 0.2));
      mix-blend-mode: screen;
      isolation: isolate;
    }

    /* Orbital rings */
    .orbital {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      pointer-events: none;
      animation: spinSlow linear infinite;
    }

    .orbital-1 {
      width: 680px;
      height: 680px;
      border-color: rgba(80, 140, 255, 0.10);
      animation-duration: 40s;
    }

    .orbital-2 {
      width: 760px;
      height: 760px;
      border-color: rgba(120, 80, 255, 0.06);
      animation-duration: 60s;
      animation-direction: reverse;
    }

    .orbital-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--cyan-accent);
      box-shadow: 0 0 8px var(--cyan-accent);
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes spinSlow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Horizontal scan line */
    .scanline {
      position: absolute;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(140, 60, 255, 0.3) 30%, rgba(200, 100, 255, 0.5) 50%, rgba(140, 60, 255, 0.3) 70%, transparent 100%);
      animation: scan 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        top: -2px;
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      95% {
        opacity: 1;
      }

      100% {
        top: 100%;
        opacity: 0;
      }
    }

    /* ── CARD ── */

    .card-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 0;
    }

    .card {
      position: relative;
      padding: 36px 40px 36px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid var(--border);
      backdrop-filter: blur(40px) saturate(1.6);
      -webkit-backdrop-filter: blur(40px) saturate(1.6);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 40px 80px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(100, 20, 200, 0.12);
      animation: cardIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Corner accents */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      width: 60px;
      height: 60px;
      border-top: 2px solid var(--purple-core);
      border-left: 2px solid var(--purple-core);
      border-radius: 28px 0 0 0;
      opacity: 0.7;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 60px;
      height: 60px;
      border-bottom: 2px solid var(--fuchsia-core);
      border-right: 2px solid var(--fuchsia-core);
      border-radius: 0 0 28px 0;
      opacity: 0.7;
    }

    /* ── HEADER ── */

    .header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin: 0 auto 10px;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 18px rgba(100, 200, 255, 0.5)) drop-shadow(0 0 32px rgba(140, 60, 255, 0.4));
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordmark {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 30px;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      line-height: 1;
    }

    .wordmark span {
      background: linear-gradient(135deg, var(--purple-core), var(--fuchsia-core));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.45em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── CITIZENSHIP FORM ── */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .citizenship-note {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 24px;
      text-align: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0;
      margin-bottom: 28px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: rgba(180, 130, 255, 0.6);
    }

    .btn-citizenship {
      width: 100%;
      position: relative;
      padding: 17px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: white;
      background: linear-gradient(135deg, #1a0050 0%, #3d007a 50%, #1a0050 100%);
      border: 1px solid var(--border-glow);
      box-shadow: 0 4px 30px rgba(140, 60, 255, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, background 0.3s;
      margin-top: 8px;
    }

    .btn-citizenship:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--purple-core), var(--fuchsia-core));
      box-shadow: 0 8px 40px rgba(140, 60, 255, 0.4);
    }

    .btn-citizenship:active {
      transform: scale(0.98);
    }

    /* ── DIVIDER ── */

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 22px;
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── FORM ── */

    .form-group {
      margin-bottom: 16px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .form-group:nth-child(1) {
      animation-delay: 0.35s;
    }

    .form-group:nth-child(2) {
      animation-delay: 0.45s;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 16px 15px 44px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      caret-color: var(--purple-core);
    }

    input::placeholder {
      color: rgba(180, 160, 220, 0.25);
      font-size: 13px;
    }

    input:focus {
      border-color: var(--border-glow);
      background: rgba(140, 60, 255, 0.07);
      box-shadow: 0 0 0 3px rgba(140, 60, 255, 0.12), 0 0 20px rgba(140, 60, 255, 0.08);
    }

    input:focus+.input-line {
      transform: scaleX(1);
    }

    input:focus~.input-icon {
      opacity: 0.7;
    }

    .input-line {
      position: absolute;
      bottom: 0;
      left: 14px;
      right: 14px;
      height: 1px;
      background: linear-gradient(90deg, var(--purple-core), var(--fuchsia-core));
      border-radius: 1px;
      transform: scaleX(0);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      transform-origin: left;
    }

    /* Password toggle */
    .pwd-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .pwd-toggle:hover {
      color: var(--text-muted);
    }

    /* ── REMEMBER ROW ── */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      margin-top: 4px;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .checkbox-wrap input[type="checkbox"]:checked {
      background: var(--purple-core);
      border-color: var(--purple-core);
    }

    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 5px;
      width: 4px;
      height: 7px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .forgot-link {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: rgba(180, 120, 255, 0.7);
    }

    /* ── BUTTON ── */

    .btn-enter {
      width: 100%;
      position: relative;
      padding: 17px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: white;
      background: linear-gradient(135deg, var(--purple-core) 0%, var(--fuchsia-core) 100%);
      box-shadow: 0 4px 30px rgba(140, 60, 255, 0.35), 0 1px 0 rgba(255, 255, 255, 0.15) inset;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      animation: fadeUp 0.8s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn-enter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, transparent 60%);
      transition: opacity 0.3s;
      opacity: 0;
    }

    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(140, 60, 255, 0.5), 0 1px 0 rgba(255, 255, 255, 0.15) inset;
    }

    .btn-enter:hover::before {
      opacity: 1;
    }

    .btn-enter:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 20px rgba(140, 60, 255, 0.3);
    }

    /* shimmer sweep on button */
    .btn-enter::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: skewX(-20deg);
      animation: shimmer 4s 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        left: -100%;
      }

      40%,
      100% {
        left: 160%;
      }
    }

    /* ── WEB3 CONNECT BUTTON ── */
    .btn-web3 {
      width: 100%;
      position: relative;
      padding: 15px;
      border-radius: 14px;
      cursor: pointer;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn-web3:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .btn-web3 svg {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .or-divider .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    .or-divider span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── FOOTER ── */

    .card-footer {
      margin-top: 20px;
      text-align: center;
      animation: fadeUp 0.8s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border));
    }

    .sep-line:last-child {
      background: linear-gradient(270deg, transparent, var(--border));
    }

    .sep-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .citizenship-btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(200, 160, 255, 0.6);
      transition: all 0.3s;
      cursor: pointer;
    }

    .citizenship-btn:hover {
      border-color: var(--border-glow);
      color: var(--text-primary);
      background: rgba(140, 60, 255, 0.07);
      box-shadow: 0 0 20px rgba(140, 60, 255, 0.1);
    }

    /* ── BOTTOM BAR ── */

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(180, 120, 255, 0.08);
      animation: fadeUp 1s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .bottom-link {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .bottom-link:hover {
      color: rgba(180, 130, 255, 0.55);
    }

    .dot-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(180, 130, 255, 0.2);
      flex-shrink: 0;
    }

    /* ── UTILITY ── */

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 36px 28px 32px;
      }

      .wordmark {
        font-size: 26px;
      }

      .globe-img {
        width: 360px;
        height: 360px;
      }

      .orbital-1 {
        width: 420px;
        height: 420px;
      }

      .orbital-2 {
        width: 490px;
        height: 490px;
      }
    }
  </style>
</head>

  <!-- CARD -->
  <div class="card-wrap">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <!-- Inline SVG  (no image dependency) -->
        <img src="Logo.png.png" alt="NexaVerse Logo" class="logo-img" />

        <div class="wordmark">NEXA<span>VERSE</span></div>
        <div class="tagline">The Global Digital Nation</div>
      </div>

      <div class="divider"></div>

      <!-- VIEW: LOGIN -->
      <div id="view-login" class="view active">
        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <!-- Citizen ID -->
          <div class="form-group">
            <label for="citizen-id">Citizen ID</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input id="citizen-id" type="text" placeholder="Enter your Nexa ID" autocomplete="username"
                spellcheck="false">
              <div class="input-line"></div>
            </div>
          </div>

          <!-- Security Key -->
          <div class="form-group">
            <label for="security-key">Security Key</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input id="security-key" type="password" placeholder="••••••••••••" autocomplete="current-password">
              <div class="input-line"></div>
              <button class="pwd-toggle" type="button" onclick="togglePwd()" aria-label="Toggle visibility">
                <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember / Forgot -->
          <div class="remember-row">
            <label class="checkbox-wrap">
              <input type="checkbox" id="remember">
              <span class="checkbox-label">Remember access</span>
            </label>
            <a href="#" class="forgot-link">Access Recovery</a>
          </div>

          <!-- Enter Button -->
          <button class="btn-enter" type="submit">Enter The Nation</button>
        </form>

        <!-- Footer -->
        <div class="card-footer">
          <div class="separator">
            <div class="sep-line"></div>
            <span class="sep-text">New here?</span>
            <div class="sep-line"></div>
          </div>
          <a href="request-citizenship.html" class="citizenship-btn">Request Citizenship</a>
          <br>
          <a href="dashboard.html" class="citizenship-btn" style="border-color: rgba(0, 229, 255, 0.4); color: var(--neon-cyan);">Direct Access: Apps Dashboard</a>
        </div>
      </div>

      <!-- VIEW: CITIZENSHIP -->
      <div id="view-citizenship" class="view">
        <button class="back-btn" onclick="showView('login')" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
          Back to Login
        </button>

        <p class="citizenship-note">Join the digital frontier. Fill in your details to apply for NexaVerse citizenship
          and gain access to the nation.</p>

        <!-- Full Name -->
        <div class="form-group" style="animation-delay:0.1s">
          <label for="full-name">Full Name</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input id="full-name" type="text" placeholder="Your full name" autocomplete="name" spellcheck="false">
            <div class="input-line"></div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group" style="animation-delay:0.15s">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input id="email" type="email" placeholder="citizen@nexaverse.io" autocomplete="email" spellcheck="false">
            <div class="input-line"></div>
          </div>
        </div>

        <!-- Desired ID -->
        <div class="form-group" style="animation-delay:0.2s">
          <label for="desired-id">Desired Citizen ID</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" />
              <path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z" />
            </svg>
            <input id="desired-id" type="text" placeholder="Choose your Nexa handle" spellcheck="false">
            <div class="input-line"></div>
          </div>
        </div>

        <!-- New Security Key -->
        <div class="form-group" style="animation-delay:0.25s">
          <label for="new-key">Security Key</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="rgba(180,130,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input id="new-key" type="password" placeholder="Create a secure key" autocomplete="new-password">
            <div class="input-line"></div>
          </div>
        </div>

        <!-- Terms checkbox -->
        <div class="remember-row" style="margin-bottom: 24px;">
          <label class="checkbox-wrap">
            <input type="checkbox" id="terms">
            <span class="checkbox-label">I accept the Terms of Nation</span>
          </label>
        </div>

        <button class="btn-citizenship" type="button">Submit Application</button>
      </div>

    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <a href="#" class="bottom-link">Privacy Protocol</a>
      <div class="dot-sep"></div>
      <a href="#" class="bottom-link">Terms of Nation</a>
      <div class="dot-sep"></div>
      <a href="#" class="bottom-link">Support</a>
    </div>

  </div>

  <script>
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
      // animate in
      const el = document.getElementById('view-' + name);
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = 'fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both';
    }

    function togglePwd() {
      const inp = document.getElementById('security-key');
      const icon = document.getElementById('eye-icon');
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      icon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-enter');
      btn.innerText = "Authenticating...";
      btn.style.opacity = "0.7";
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1200);
    }
  </script>

</body>

</html>
